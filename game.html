<head>

        rel="stylesheet">
    <title>Study Checklist</title>

    <style>
        :root {
            --color: #ffffff;
            --bac: ;
            --dayred: #bc0000;
            --daygreen: green;
            --progress: #ffffff;

        }

        .gaegu-regular {
            font-family: "Gaegu", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .bitcount-prop-single {
            font-family: "Bitcount Prop Single", system-ui;
            font-optical-sizing: auto;
            font-weight: 248;
            font-style: normal;
            font-variation-settings:
                "slnt" 0,
                "CRSV" 0.5,
                "ELSH" 0,
                "ELXP" 0;
        }

        .elms-sans {
            font-family: "Elms Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 200;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url(https://i.pinimg.com/originals/8a/cc/22/8acc22e8f29808dd8f21ffba5c4d32c8.gif);

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            color: var(--color);
            padding: 20px;
            font-family: "Elms Sans", sans-serif;
            font-weight: 400;
        }

        .back {
            width: 140px;
            margin: 10px;
            padding: 10px;
            color: white;
            border: 1px solid white;
            text-align: center;
            border-radius: 90px;
        }

        .back a {
            text-decoration: none;
            color: white;
        }

        .back a:hover {
            text-decoration: underline;
            color: #98daee;
        }

        /* MAIN */
        .container {
            max-width: 1500px;
            margin: auto;
        }

        h1 {
            text-align: center;
            border-radius: 90px;
            padding: 15px;
            border: 1px solid var;
            width: 100%;
            background-color: var(--bac);
            font-size: 45px;
            margin-bottom: 20px;
            font-family: "Gaegu", sans-serif;
        }

        h2 {
            font-family: "Gaegu", sans-serif;
            font-weight: 600;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;

        }

        select {
            padding: 10px;
            border: none;
            border-radius: 12px;
            border: 1px solid var(--color);
            background: black;
            color: var(--color);
            font-size: 18px;
            font-family: "Gaegu", sans-serif;
            font-weight: 600;
        }

        /* LAYOUT */
        .layout {
            display: flex;
            gap: 10px;
            align-items: flex-start;

        }

        /* main */
        main {
            flex: 2;
            height: 800px;
            overflow: hidden;
            overflow-y: auto;
            overflow-x: hidden;

        }

        ::-webkit-scrollbar {
            scrollbar-width: none;
        }

        main::-webkit-scrollbar {
            width: 8px;
        }

        /* RIGHT */
        .right-sidebar {
            flex: 1;
        }

        /* CARD */
        .card {
            background: var(--bc);
            border: 1px solid var(--color);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .box {
            display: flex;
            gap: 10px
        }

        /* CALENDAR */
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .day {
            border: 1px solid #4c4c4e;
            background-color: var(--dayred);
            color: var(--color);
            padding: 15px;
            border-radius: 100px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }

        .day:hover {
            transform: scale(1.05);
        }

        .done {
            background: var(--daygreen) !important;
        }

        /* PROGRESS BAR */
        .progress-container {
            width: 100%;
            height: 22px;
            background: var(--progress);
            border-radius: 20px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #ffe46a;
            transition: 0.3s;
        }

        /* YEAR */
        .level-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* TEXTAREA */
        textarea {
            width: 100%;
            height: 140px;
            margin-top: 15px;
            border: none;
            border-radius: 15px;
            padding: 15px;
            background: #424146;
            color: var(--color);
            resize: none;
        }

        /* TASKS */
        .task,
        .checklist-item {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        /* TEXT */
        .small-text {
            opacity: 0.8;
            margin-top: 10px;
        }

        .dday-card {
            height: auto;
            width: 320px;
            border: 1px solid var(--color);
            padding: 20px;
            border-radius: 15px;
            color: var(--color);

        }

        .dday-image {

            height: 190px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            background-position: center 50%;

        }

        .dday-card h2 {

        }

        .dday-item {

            margin-bottom: 18px;
            font-size: 18px;

        }

        .dday-item span:last-child {

            border-radius: 10px;

        }

        .pink span:last-child {

            background: #527851;

        }

        .green span:last-child {

        }

========================= */
        @media (max-width: 900px) {

            }

                font-size: 22px;
            }

        }
    </style>
</head>

        <script>

            // ELEMENTS
            const calendar =
                document.getElementById("calendar");

            const monthSelect =
                document.getElementById("monthSelect");

            const yearSelect =
                document.getElementById("yearSelect");

            const monthProgress =
                document.getElementById("monthProgress");

            const monthText =
                document.getElementById("monthText");

            const yearProgress =
                document.getElementById("yearProgress");

            const streakText =
                document.getElementById("streakText");

            const levelText =
                document.getElementById("levelText");

            const statement =
                document.getElementById("statement");


            // MONTHS
            const months = [
                "January",
                "February",
                "March",
                "April",
                "May",
                "June",
                "July",
                "August",
                "September",
                "October",
                "November",
                "December"
            ];


            // DATE
            const currentDate =
                new Date();


            // CREATE MONTH
            months.forEach((month, index) => {

                const option =
                    document.createElement("option");

                option.value = index;
                option.textContent = month;

                monthSelect.appendChild(option);

            });


            // CREATE YEAR
            for (let year = 2026; year <= 2035; year++) {

                const option =
                    document.createElement("option");

                option.value = year;
                option.textContent = year;

                yearSelect.appendChild(option);

            }


            // DEFAULT
            monthSelect.value =
                currentDate.getMonth();

            yearSelect.value =
                currentDate.getFullYear();


            // SAVE
            function saveData(key, data) {

                localStorage.setItem(
                    key,
                    JSON.stringify(data)
                );

            }


            // LOAD
            function loadData(key) {

                return JSON.parse(
                    localStorage.getItem(key)
                ) || [];

            }


            // CALENDAR
            function renderCalendar() {

                calendar.innerHTML = "";

                const month =
                    parseInt(monthSelect.value);

                const year =
                    parseInt(yearSelect.value);

                const daysInMonth =
                    new Date(
                        year,
                        month + 1,
                        0
                    ).getDate();

                const storageKey =
                    `calendar-${month}-${year}`;

                let savedDays =
                    loadData(storageKey);

                for (let day = 1; day <= daysInMonth; day++) {

                    const div =
                        document.createElement("div");

                    div.classList.add("day");

                    div.textContent = day;

                    if (savedDays.includes(day)) {

                        div.classList.add("done");

                    }

                    div.addEventListener("click", () => {

                        div.classList.toggle("done");

                        if (savedDays.includes(day)) {

                            savedDays =
                                savedDays.filter(
                                    d => d !== day
                                );

                        } else {

                            savedDays.push(day);

                        }

                        saveData(storageKey, savedDays);

                        updateMonthProgress(
                            daysInMonth,
                            savedDays.length
                        );

                        updateYearStats();

                    });

                    calendar.appendChild(div);

                }

                updateMonthProgress(
                    daysInMonth,
                    savedDays.length
                );

                loadStatement();

            }


            // MONTH PROGRESS
            function updateMonthProgress(total, done) {

                const percent =
                    Math.round(
                        (done / total) * 100
                    );

                monthProgress.style.width =
                    percent + "%";

                monthText.textContent =
                    percent + "% Complete";

            }


            // YEAR STREAK
            function updateYearStats() {

                let totalDone = 0;

                for (let m = 0; m < 12; m++) {

                    const key =
                        `calendar-${m}-${yearSelect.value}`;

                    const data =
                        loadData(key);

                    totalDone += data.length;

                }

                streakText.textContent =
                    totalDone + " Days";

                const percent =
                    Math.min(
                        (totalDone / 365) * 100,
                        100
                    );

                yearProgress.style.width =
                    percent + "%";

                let level = 1;

                if (totalDone >= 30) level = 2;
                if (totalDone >= 60) level = 3;
                if (totalDone >= 120) level = 4;
                if (totalDone >= 200) level = 5;
                if (totalDone >= 300) level = 6;

                levelText.textContent =
                    "Level " + level;

            }


            // STATEMENT
            function getStatementKey() {

                return `statement-${monthSelect.value}-${yearSelect.value}`;

            }


            function loadStatement() {

                const key =
                    getStatementKey();

                statement.value =
                    localStorage.getItem(key)
                    || "";

            }


            statement.addEventListener("input", () => {

                const key =
                    getStatementKey();

                localStorage.setItem(
                    key,
                    statement.value
                );

            });


            // SUBJECT FUNCTION
            function setupSubject(
                checkClass,
                progressId,
                textId,
                storageKey
            ) {

                const checks =
                    document.querySelectorAll(checkClass);

                const progress =
                    document.getElementById(progressId);

                const text =
                    document.getElementById(textId);


                // LOAD
                const saved =
                    JSON.parse(
                        localStorage.getItem(storageKey)
                    ) || [];

                checks.forEach((check, index) => {

                    check.checked =
                        saved[index] || false;

                    check.addEventListener(
                        "change",
                        update
                    );

                });


                // UPDATE
                function update() {

                    let checked = 0;

                    checks.forEach(check => {

                        if (check.checked) {

                            checked++;

                        }

                    });

                    const percent =
                        Math.round(
                            (checked / checks.length) * 100
                        );

                    progress.style.width =
                        percent + "%";

                    text.textContent =
                        percent + "% Complete";


                    // SAVE
                    const saveArray = [];

                    checks.forEach(check => {

                        saveArray.push(check.checked);

                    });

                    localStorage.setItem(
                        storageKey,
                        JSON.stringify(saveArray)
                    );

                }

                update();

            }


            // START SUBJECT
            setupSubject(
                ".subjectCheck1",
                "subjectProgress1",
                "subjectText1",
                "subjectSave1"
            );

            setupSubject(
                ".subjectCheck2",
                "subjectProgress2",
                "subjectText2",
                "subjectSave2"
            );


            // DAILY CHECKLIST
            const dailyChecks =
                document.querySelectorAll(".dailyCheck");

            const savedDaily =
                JSON.parse(
                    localStorage.getItem("dailyChecks")
                ) || [];

            dailyChecks.forEach((check, index) => {

                check.checked =
                    savedDaily[index] || false;

                check.addEventListener("change", () => {

                    const saveArray = [];

                    dailyChecks.forEach(box => {

                        saveArray.push(box.checked);

                    });

                    localStorage.setItem(
                        "dailyChecks",
                        JSON.stringify(saveArray)
                    );

                });

            });


            // CHANGE MONTH
            monthSelect.addEventListener(
                "change",
                () => {

                    renderCalendar();
                    updateYearStats();

                }
            );


            // CHANGE YEAR
            yearSelect.addEventListener(
                "change",
                () => {

                    renderCalendar();
                    updateYearStats();

                }
            );


            // START
            renderCalendar();
            updateYearStats();


            // TGAT DATE
            const tgatDate =
                new Date("2027-12-01");

            // ALEVEL DATE
            const alevelDate =
                new Date("2028-03-01");


            // TODAY
            const today =
                new Date();


            // FUNCTION
            function getDaysLeft(targetDate) {

                const diff =
                    targetDate - today;

                const days =
                    Math.ceil(
                        diff / (1000 * 60 * 60 * 24)
                    );

                return days;

            }


            // SHOW TGAT
            document.getElementById("tgatDay")
                .innerText =
                getDaysLeft(tgatDate)
                + " day left!";


            // SHOW ALEVEL
            document.getElementById("alevelDay")
                .innerText =
                getDaysLeft(alevelDate)
                + " day left!";

        </script>

    </body>


</html>
